<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Certificate Download</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #667eea;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        .preview {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Certificate Generator</h1>
        <p>Test the certificate download feature</p>
        
        <input type="text" id="username" placeholder="Enter your name" value="Student">
        
        <button onclick="downloadCertificate()">
            🎓 Download Certificate
        </button>
        
        <div class="preview">
            <h3>Certificate Preview</h3>
            <p>✓ Mathematics</p>
            <p>✓ Science</p>
            <p>✓ History</p>
            <p>✓ Technology</p>
        </div>
    </div>

    <script>
        function downloadCertificate() {
            const username = document.getElementById('username').value || 'Student';
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });
            
            // Certificate design
            doc.setFillColor(102, 126, 234);
            doc.rect(0, 0, 297, 210, 'F');
            
            doc.setFillColor(255, 255, 255);
            doc.rect(10, 10, 277, 190, 'F');
            
            doc.setFillColor(102, 126, 234);
            doc.rect(15, 15, 267, 180, 'F');
            
            doc.setFillColor(255, 255, 255);
            doc.rect(20, 20, 257, 170, 'F');
            
            // Title
            doc.setFontSize(32);
            doc.setTextColor(102, 126, 234);
            doc.text('CERTIFICATE OF COMPLETION', 148.5, 50, { align: 'center' });
            
            // Body
            doc.setFontSize(16);
            doc.setTextColor(0, 0, 0);
            doc.text('This certifies that', 148.5, 70, { align: 'center' });
            
            doc.setFontSize(28);
            doc.setTextColor(102, 126, 234);
            doc.text(username.toUpperCase(), 148.5, 90, { align: 'center' });
            
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text('has successfully completed all categories in the', 148.5, 105, { align: 'center' });
            doc.text('Gamified Learning Dashboard', 148.5, 115, { align: 'center' });
            
            // Categories
            doc.setFontSize(12);
            doc.text('✓ Mathematics', 80, 135);
            doc.text('✓ Science', 80, 145);
            doc.text('✓ History', 170, 135);
            doc.text('✓ Technology', 170, 145);
            
            // Footer
            doc.setFontSize(10);
            const date = new Date().toLocaleDateString();
            doc.text(`Date: ${date}`, 40, 175);
            doc.text(`Certificate ID: ${Date.now()}`, 200, 175);
            
            // Save
            doc.save(`${username}_certificate.pdf`);
            
            alert('🎉 Certificate downloaded successfully!');
        }
    </script>
</body>
</html>
