<!DOCTYPE html>
<html>
<head>
    <title>Test Badges</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>🔧 Badge Testing Tool</h1>
    
    <div class="test-section">
        <h2>1. Check User Profile</h2>
        <input type="text" id="username" placeholder="Enter username" style="padding: 10px; width: 300px;">
        <button onclick="checkProfile()">Check Profile</button>
        <div id="profile-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Get User Badges</h2>
        <input type="number" id="userId" placeholder="Enter user ID" style="padding: 10px; width: 300px;">
        <button onclick="getBadges()">Get Badges</button>
        <div id="badges-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Manually Award Badges</h2>
        <input type="text" id="username2" placeholder="Enter username" style="padding: 10px; width: 300px;">
        <button onclick="awardBadges()">Award All Eligible Badges</button>
        <div id="award-result" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8081/api';
        
        async function checkProfile() {
            const username = document.getElementById('username').value;
            const resultDiv = document.getElementById('profile-result');
            
            try {
                const response = await fetch(`${API_URL}/users/profile/${username}`);
                const user = await response.json();
                
                resultDiv.innerHTML = `
<strong>User Profile:</strong>
Username: ${user.username}
Points: ${user.points}
User ID: ${user.id}
Badges: ${user.userBadges?.length || 0}
Achievements: ${user.achievements?.length || 0}
                `;
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function getBadges() {
            const userId = document.getElementById('userId').value;
            const resultDiv = document.getElementById('badges-result');
            
            try {
                const response = await fetch(`${API_URL}/badges/user/${userId}`);
                const badges = await response.json();
                
                if (badges.length === 0) {
                    resultDiv.innerHTML = 'No badges earned yet.';
                } else {
                    resultDiv.innerHTML = `
<strong>Badges Earned (${badges.length}):</strong>
${badges.map(ub => `
- ${ub.badge.icon} ${ub.badge.name}
  ${ub.badge.description}
  Earned: ${new Date(ub.earnedAt).toLocaleString()}
`).join('\n')}
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function awardBadges() {
            const username = document.getElementById('username2').value;
            const resultDiv = document.getElementById('award-result');
            
            try {
                const response = await fetch(`${API_URL}/test/check-badges/${username}`, {
                    method: 'POST'
                });
                
                const result = await response.text();
                resultDiv.innerHTML = `
<strong>Result:</strong>
${result}

Now check the user's profile to see updated badges!
                `;
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
